server:
  port: 8761

spring:
  application:
    name: service-registry
  # Bootstrap config import — contact config-server at startup
  config:
    import: "optional:configserver:${CONFIG_SERVER_URI:http://localhost:8888}"

eureka:
  instance:
    hostname: ${EUREKA_HOST:localhost}
    prefer-ip-address: false
  client:
    # This IS the registry — it does not register with itself
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/
  server:
    wait-time-in-ms-when-sync-empty: 0 # speeds up startup in dev
    enable-self-preservation: false # disable in dev to avoid false alarms

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
